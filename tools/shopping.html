<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>超市優惠計算器</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Figtree', 'Noto Sans TC', 'sans-serif'],
                        body: ['DM Sans', 'Noto Sans TC', 'sans-serif'],
                    },
                    boxShadow: {
                        'tf-subtle': '0 1px 3px rgba(0,0,0,0.06)',
                        'tf-medium': '0 4px 12px rgba(0,0,0,0.08)',
                        'tf-large': '0 8px 24px rgba(0,0,0,0.12)',
                        'tf-overlay': '0 16px 48px rgba(0,0,0,0.18)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);
            --sar: env(safe-area-inset-right, 0px);
        }
        
        body {
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            padding-left: var(--sal);
            padding-right: var(--sar);
            min-height: 100vh;
            min-height: 100dvh;
        }

        .pulse-mic { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 113, 113, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(249, 113, 113, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 113, 113, 0.7); }
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .winner-card { border: 2px solid #34d399 !important; background-color: #ecfdf5 !important; }
        
        /* Ensure SVGs are visible */
        svg { display: block; shape-rendering: auto; }
        
        /* Mobile touch targets - minimum 44px */
        .touch-btn {
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .touch-btn-sm {
            min-height: 44px;
            min-width: 44px;
            padding: 12px;
        }
        
        /* Modal backdrop */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 40;
        }
        
        /* Smooth scrolling */
        .scroll-smooth {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Prevent text selection on interactive elements */
        button, label {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-tf-large overflow-hidden border border-slate-200 flex flex-col min-h-[95vh] min-h-[95dvh]">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white shrink-0">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2 min-w-0">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <h1 class="text-xl md:text-2xl font-extrabold shrink-0" style="font-family: 'Figtree', 'Noto Sans TC', sans-serif;">購物助手</h1>
                    <button onclick="renameCurrentList()" class="bg-blue-700/50 hover:bg-blue-700/70 px-3 py-1.5 rounded-xl transition-colors min-w-0 max-w-[120px]">
                        <span id="current-list-name" class="text-sm font-bold block truncate">未命名清單</span>

                <div class="flex gap-1">
                    <button onclick="promptSaveCurrentAs()" class="touch-btn-sm p-3 hover:bg-blue-500 rounded-full transition-colors" title="儲存目前為新清單">

                    </button>
                    <button onclick="createNewList()" class="touch-btn-sm p-3 hover:bg-blue-500 rounded-full transition-colors" title="新增空白清單">

                    </button>
                    <button onclick="toggleSettings()" class="touch-btn-sm p-3 hover:bg-blue-500 rounded-full transition-colors" title="設定">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0-2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                </div>
            </div>
            
            <div id="settings-panel" class="hidden mb-4 bg-blue-700/50 p-4 rounded-2xl">

            <button onclick="calculateComparison()" class="w-full bg-blue-600 text-white font-bold py-4 min-h-[56px] rounded-2xl shadow-tf-medium active:scale-95 transition-all flex items-center justify-center gap-2">

        <!-- View: History -->

                    <button onclick="clearHistory()" class="touch-btn text-sm font-bold text-slate-400 hover:text-red-500 px-3 py-2 min-h-[44px] rounded-xl">清空歷史</button>
                </div>

            </div>
        </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-2xl shadow-tf-large opacity-0 transition-all duration-500 z-50 font-bold flex items-center gap-2 pointer-events-none" style="bottom: max(2rem, calc(2rem + var(--sab)));">
        <span id="toast-icon"></span> <span id="toast-msg"></span>
    </div>

    <script>
        let items = [];
        let history = JSON.parse(localStorage.getItem('shop_history') || '[]');
        const DEFAULT_TARGET = 100.00;
        let THRESHOLD = DEFAULT_TARGET;
        let recognition;

        function calculateItemPrice(item) {
            if (!item.hasSpecial || !item.specialQty || !item.specialPrice) {
                return item.price * item.qty;
            }
            const specialBundles = Math.floor(item.qty / item.specialQty);
            const remainderQty = item.qty % item.specialQty;
            return (specialBundles * item.specialPrice) + (remainderQty * item.price);
        }

        function calculateItemSavings(item) {
            if (!item.hasSpecial || !item.specialQty || !item.specialPrice) return 0;
            const regularPrice = item.price * item.qty;
            const specialPrice = calculateItemPrice(item);
            return regularPrice - specialPrice;
        }

        function toggleSpecialOffer() {
            const panel = document.getElementById('special-offer-panel');
            const arrow = document.getElementById('special-toggle-arrow');
            const text = document.getElementById('special-toggle-text');
            panel.classList.toggle('hidden');
            if (panel.classList.contains('hidden')) {
                arrow.style.transform = 'rotate(0deg)';
                text.innerText = '優惠設定';
            } else {
                arrow.style.transform = 'rotate(180deg)';
                text.innerText = '收合優惠設定';
            }
        }

        function toggleSpecialInputs() {
            const enabled = document.getElementById('special-enabled').checked;
            const qtyEl = document.getElementById('special-qty');
            const priceEl = document.getElementById('special-price');
            
            if (enabled) {
                qtyEl.disabled = false;
                priceEl.disabled = false;
                qtyEl.classList.remove('bg-slate-100', 'text-slate-400');
                priceEl.classList.remove('bg-slate-100', 'text-slate-400');
            } else {
                qtyEl.disabled = true;
                priceEl.disabled = true;
                qtyEl.classList.add('bg-slate-100', 'text-slate-400');
                priceEl.classList.add('bg-slate-100', 'text-slate-400');
            }
        }

        let currentListId = null;
        let currentListName = '未命名清單';
        let savedLists = [];

        function loadSavedLists() {
            try {
                const stored = localStorage.getItem('shop_saved_lists');
                savedLists = stored ? JSON.parse(stored) : [];
            } catch (e) {
                savedLists = [];
            }
        }

        function saveSavedLists() {
            localStorage.setItem('shop_saved_lists', JSON.stringify(savedLists.slice(0, 30)));
        }

        function loadCurrentList() {
            try {
                const stored = localStorage.getItem('shop_current_list');
                if (stored) {
                    const data = JSON.parse(stored);
                    currentListId = data.id;
                    currentListName = data.name || '未命名清單';
                    THRESHOLD = data.targetAmount || DEFAULT_TARGET;
                    items = data.items || [];
                } else {
                    createNewListInternal();
                }
            } catch (e) {
                createNewListInternal();
            }
            updateCurrentListNameUI();
            updateTargetUI();
        }

        function saveCurrentList() {
            const total = items.reduce((s, i) => s + calculateItemPrice(i), 0);
            const data = {
                id: currentListId,
                name: currentListName,
                targetAmount: THRESHOLD,
                updatedAt: new Date().toISOString(),
                total: total,
                items: [...items]
            };
            localStorage.setItem('shop_current_list', JSON.stringify(data));
            
            const existingIndex = savedLists.findIndex(l => l.id === currentListId);
            if (existingIndex >= 0) {
                savedLists[existingIndex] = { ...data };
                saveSavedLists();
            }
        }

        function createNewListInternal(name) {
            currentListId = Date.now();
            currentListName = name || '未命名清單';
            THRESHOLD = DEFAULT_TARGET;
            items = [];
            saveCurrentList();
            updateCurrentListNameUI();
            updateTargetUI();
        }

        function updateCurrentListNameUI() {
            document.getElementById('current-list-name').innerText = currentListName;
        }

        function updateTargetUI() {
            document.getElementById('goal-text').innerText = `目標金額: $${THRESHOLD.toFixed(2)}`;
            document.getElementById('target-input').value = THRESHOLD;
        }

        function renameCurrentList() {
            const newName = prompt('請輸入新名稱：', currentListName);
            if (newName !== null && newName.trim() !== '') {
                currentListName = newName.trim();
                
                if (currentListId !== null) {
                    loadSavedLists();
                    const list = savedLists.find(l => l.id === currentListId);
                    if (list) {
                        list.name = currentListName;
                        saveSavedLists();
                        updateSavedListsPageUI();
                    }
                }
                
                saveCurrentList();
                updateCurrentListNameUI();
            }
        }

        function deleteSavedList(id) {
            if (confirm('確定要刪除此清單嗎？')) {
                loadSavedLists();
                savedLists = savedLists.filter(l => l.id !== id);
                saveSavedLists();
                updateSavedListsPageUI();
                
                if (id === currentListId) {
                    createNewListInternal('未命名清單');
                }
            }
        }

        function renameSavedList(id) {
            loadSavedLists();
            const list = savedLists.find(l => l.id === id);
            if (list) {
                const newName = prompt('請輸入新名稱：', list.name);
                if (newName !== null && newName.trim() !== '') {
                    list.name = newName.trim();
                    saveSavedLists();
                    updateSavedListsPageUI();
                    if (id === currentListId) {
                        currentListName = newName.trim();
                        updateCurrentListNameUI();
                        saveCurrentList();
                    }
                }
            }
        }

        function loadSavedListFromPage(id) {
            loadSavedList(id);
            switchTab('current');
        }

        function copyHistoryToNewList(id) {
            const record = history.find(h => h.id === id);
            if (record) {
                const newId = Date.now();
                const newName = prompt('請輸入新清單名稱：', record.time);
                if (newName !== null && newName.trim() !== '') {
                    loadSavedLists();
                    currentListId = newId;
                    currentListName = newName.trim();
                    THRESHOLD = record.targetAmount || DEFAULT_TARGET;
                    items = record.list ? [...record.list] : [];
                    saveCurrentList();
                    
                    savedLists.unshift({
                        id: newId,
                        name: currentListName,
                        targetAmount: THRESHOLD,
                        updatedAt: new Date().toISOString(),
                        total: record.total,
                        items: [...items]
                    });
                    saveSavedLists();
                    
                    updateCurrentListNameUI();
                    updateTargetUI();
                    updateUI();
                    showToast('已複製為新清單', '📋', 'bg-blue-800');
                    switchTab('current');
                }
            }
        }

                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${time}</p>

                            </div>

                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                                </button>
                                <button onclick="deleteSavedList(${list.id})" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${list.items ? list.items.map(i => `<span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-lg text-[10px] font-bold">${i.name} x${i.qty}</span>`).join('') : ''}
                        </div>
                        <button onclick="loadSavedListFromPage(${list.id})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-tf-subtle transition-colors active:scale-95 flex items-center justify-center gap-2 ${isCurrent ? 'opacity-50 cursor-not-allowed' : ''}">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            ${isCurrent ? '目前編輯中' : '載入此清單'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function createNewList() {
            const name = prompt('請輸入新清單名稱：', `清單 ${savedLists.length + 1}`);
            if (name !== null && name.trim() !== '') {
                loadSavedLists();
                createNewListInternal(name.trim());
                
                const total = items.reduce((s, i) => s + calculateItemPrice(i), 0);
                savedLists.unshift({
                    id: currentListId,
                    name: currentListName,
                    targetAmount: THRESHOLD,
                    updatedAt: new Date().toISOString(),
                    total: total,
                    items: [...items]
                });
                saveSavedLists();
                
                updateUI();
                updateSavedListsPageUI();
                showToast('已建立新清單', '✅', 'bg-blue-800');
            }
        }

        function loadSavedList(id) {
            loadSavedLists();
            const list = savedLists.find(l => l.id === id);
            if (list) {
                currentListId = list.id;
                currentListName = list.name;
                THRESHOLD = list.targetAmount || DEFAULT_TARGET;
                items = list.items ? [...list.items] : [];
                saveCurrentList();
                updateCurrentListNameUI();
                updateTargetUI();
                updateUI();
            }
        }

        function promptSaveCurrentAs() {
            const name = prompt('請輸入清單名稱：', currentListName);
            if (name !== null && name.trim() !== '') {
                loadSavedLists();
                const newId = Date.now();
                const total = items.reduce((s, i) => s + calculateItemPrice(i), 0);
                
                currentListId = newId;
                currentListName = name.trim();
                saveCurrentList();
                
                savedLists.unshift({
                    id: newId,
                    name: currentListName,
                    targetAmount: THRESHOLD,
                    updatedAt: new Date().toISOString(),
                    total: total,
                    items: [...items]
                });
                saveSavedLists();
                
                updateCurrentListNameUI();
                updateSavedListsPageUI();
                showToast('已儲存清單', '💾', 'bg-blue-800');
            }
        }

        function closeAllPanels() {
            const settingsPanel = document.getElementById('settings-panel');
            if (settingsPanel && !settingsPanel.classList.contains('hidden')) {
                settingsPanel.classList.add('hidden');
            }
        }

        window.onload = () => { 
            loadSavedLists();
            loadCurrentList();
            updateUI(); 
            updateHistoryUI(); 
            
            document.addEventListener('click', (e) => {
                const settingsBtn = e.target.closest('[onclick*="toggleSettings"]');
                const settingsPanel = document.getElementById('settings-panel');
                let clickedInsideSettingsPanel = settingsPanel && settingsPanel.contains(e.target);

            if (confirm('確定要清空所有已儲存清單嗎？')) {
                loadSavedLists();
                savedLists = [];
                saveSavedLists();
                updateSavedListsPageUI();
                
                createNewListInternal('未命名清單');
            }
        }

        function switchTab(view) {
            const tabs = ['current', 'compare', 'saved', 'history'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                const v = document.getElementById(`view-${t}`);
                if (t === view) {
                    btn.className = "flex-1 py-4 text-sm font-bold text-blue-600 border-b-2 border-blue-600 tab-transition";
                    v.classList.remove('hidden');
                } else {
                    btn.className = "flex-1 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 tab-transition";
                    v.classList.add('hidden');
                }
            });
            if (view === 'history') updateHistoryUI();
            if (view === 'saved') {
                loadSavedLists();
                updateSavedListsPageUI();
            }
        }

        function addItem() {
            const nameEl = document.getElementById('item-name');
            const priceEl = document.getElementById('item-price');
            const qtyEl = document.getElementById('item-qty');
            const specialEnabled = document.getElementById('special-enabled').checked;
            const specialQtyEl = document.getElementById('special-qty');
            const specialPriceEl = document.getElementById('special-price');
            
            const price = parseFloat(priceEl.value);
            const qty = parseInt(qtyEl.value) || 1;
            const specialQty = specialEnabled ? parseInt(specialQtyEl.value) : null;
            const specialPrice = specialEnabled ? parseFloat(specialPriceEl.value) : null;

            if (isNaN(price) || price <= 0) {
                showToast('請輸入價格', '⚠️', 'bg-red-500');
                return;
            }

            if (specialEnabled && (isNaN(specialQty) || specialQty < 2 || isNaN(specialPrice) || specialPrice <= 0)) {
                showToast('請輸入有效的優惠設定', '⚠️', 'bg-red-500');
                return;
            }

            const currentTotal = items.reduce((s, i) => s + calculateItemPrice(i), 0);
            const newItem = { 
                name: nameEl.value.trim() || `項目 ${items.length + 1}`, 
                price: price, 
                qty: qty,
                hasSpecial: specialEnabled,
                specialQty: specialQty,
                specialPrice: specialPrice
            };
            items.push(newItem);

            const newItemTotal = calculateItemPrice(newItem);
            if (currentTotal < THRESHOLD && (currentTotal + newItemTotal) >= THRESHOLD) {
                showToast('恭喜！已達到優惠門檻', '🎉', 'bg-emerald-500');
            }

            nameEl.value = ''; priceEl.value = ''; qtyEl.value = '1'; 
            document.getElementById('special-enabled').checked = false;
            specialQtyEl.value = '2';
            specialPriceEl.value = '';
            toggleSpecialInputs();
            nameEl.focus();
            saveCurrentList();
            updateUI();
        }

        function updateQty(index, delta) {
            const prevTotal = items.reduce((s, i) => s + calculateItemPrice(i), 0);
            if (items[index].qty + delta > 0) items[index].qty += delta;
            const newTotal = items.reduce((s, i) => s + calculateItemPrice(i), 0);
            if (prevTotal < THRESHOLD && newTotal >= THRESHOLD) showToast('已達標！', '🎉', 'bg-emerald-500');
            saveCurrentList();
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('items-container');
            const total = items.reduce((s, i) => s + calculateItemPrice(i), 0);
            document.getElementById('item-count').innerText = items.length;
            document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('footer-action').classList.toggle('hidden', items.length === 0);

            if (items.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-300 py-12 text-sm italic">購物清單為空</div>`;
            } else {
                container.innerHTML = items.map((item, i) => {
                    const itemTotal = calculateItemPrice(item);
                    const savings = calculateItemSavings(item);
                    const regularTotal = item.price * item.qty;
                    
                    let priceLine = `<p class="text-xs text-slate-400 font-medium">$${item.price.toFixed(1)} / 件</p>`;
                    let totalLine = `<span class="font-black text-base text-slate-800">$${itemTotal.toFixed(1)}</span>`;
                    
                    if (item.hasSpecial && item.specialQty && item.specialPrice) {
                        priceLine = `
                            <p class="text-xs text-slate-400 font-medium">$${item.price.toFixed(1)} / 件</p>
                            <p class="text-xs text-emerald-600 font-bold">買${item.specialQty}件$${item.specialPrice.toFixed(0)}</p>
                        `;
                        
                        if (savings > 0) {
                            totalLine = `
                                <div class="text-right">
                                    <span class="font-black text-base text-slate-800">$${itemTotal.toFixed(1)}</span>
                                    <p class="text-[10px] text-emerald-600 font-bold">-$${savings.toFixed(1)}</p>
                                </div>
                            `;
                        } else if (savings < 0) {
                            totalLine = `
                                <div class="text-right">
                                    <span class="font-black text-base text-slate-800">$${itemTotal.toFixed(1)}</span>
                                </div>
                            `;
                        }
                    }
                    
                     return `
                    <div class="flex justify-between items-center bg-white p-3 md:p-4 rounded-2xl border border-slate-100 shadow-tf-subtle gap-2 md:gap-3">
                        <div class="flex-1 min-w-0">
                            <button onclick="renameItem(${i})" class="text-left hover:text-blue-600 transition-colors min-w-0">
                                <p class="font-bold text-slate-800 text-base truncate">${item.name}</p>
                            </button>
                            ${priceLine}
                        </div>
                        <div class="flex items-center bg-slate-100 rounded-xl p-1 shrink-0">
                            <button onclick="updateQty(${i}, -1)" class="touch-btn-sm p-3 text-slate-500 active:bg-slate-200 rounded-lg min-w-[44px] min-h-[44px]">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <span class="w-10 text-center text-sm md:text-base font-black text-slate-700">${item.qty}</span>
                            <button onclick="updateQty(${i}, 1)" class="touch-btn-sm p-3 text-slate-500 active:bg-slate-200 rounded-lg min-w-[44px] min-h-[44px]">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                        </div>
                        <div class="min-w-[60px]">
                            ${totalLine}
                        </div>
                        <button onclick="removeItem(${i})" class="touch-btn-sm p-3 text-slate-300 hover:text-red-500 shrink-0 min-w-[44px] min-h-[44px]">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                `}).join('');
            }

            const p = Math.min((total / THRESHOLD) * 100, 100);
            const bar = document.getElementById('progress-bar');
            const remText = document.getElementById('remaining-text');
            const badge = document.getElementById('status-badge');
            bar.style.width = `${p}%`;
            
            if (total >= THRESHOLD) {
                bar.className = "bg-emerald-400 h-full transition-all duration-500 ease-out rounded-full";
                badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-600';
                badge.innerText = '已達標';
                remText.innerHTML = `<span class="text-emerald-600 font-bold">已達標！超額 $${(total-THRESHOLD).toFixed(2)}</span>`;
            } else {
                bar.className = "bg-blue-500 h-full transition-all duration-500 ease-out rounded-full";
                badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500';
                badge.innerText = '未達標';
                remText.innerHTML = total > 0 ? `還差 <span class="text-blue-600 font-bold">$${(THRESHOLD-total).toFixed(2)}</span>` : '請輸入商品';
            }
        }

        function calculateComparison() {
            const ap = parseFloat(document.getElementById('comp-a-price').value);
            const au = parseFloat(document.getElementById('comp-a-unit').value);
            const bp = parseFloat(document.getElementById('comp-b-price').value);
            const bu = parseFloat(document.getElementById('comp-b-unit').value);

            const cardA = document.getElementById('card-a');
            const cardB = document.getElementById('card-b');
            const resDiv = document.getElementById('compare-result');
            const winTxt = document.getElementById('winner-text');
            const winDiff = document.getElementById('winner-diff');

            if (!ap || !au || !bp || !bu) {
                showToast('請填寫所有欄位', '⚠️', 'bg-red-500');
                return;
            }

            const valA = ap / au;
            const valB = bp / bu;

            resDiv.classList.remove('hidden');
            cardA.classList.remove('winner-card');
            cardB.classList.remove('winner-card');

            if (valA < valB) {
                cardA.classList.add('winner-card');
                winTxt.innerText = "商品 A 更划算！";
                winDiff.innerText = `比商品 B 便宜了約 ${((valB - valA) / valB * 100).toFixed(1)}%`;
            } else if (valB < valA) {
                cardB.classList.add('winner-card');
                winTxt.innerText = "商品 B 更划算！";
                winDiff.innerText = `比商品 A 便宜了約 ${((valA - valB) / valA * 100).toFixed(1)}%`;
            } else {
                winTxt.innerText = "兩者性價比相同";
                winDiff.innerText = "";
            }
        }

        function resetComparison() {
            document.querySelectorAll('#view-compare input').forEach(i => i.value = '');
            document.getElementById('card-a').classList.remove('winner-card');
            document.getElementById('card-b').classList.remove('winner-card');
            document.getElementById('compare-result').classList.add('hidden');
        }

                total: items.reduce((s, i) => s + calculateItemPrice(i), 0),

            });

                saveSavedLists();

        function removeItem(i) { items.splice(i, 1); saveCurrentList(); updateUI(); }

        function renameItem(index) {
            if (!items[index]) return;
            const newName = prompt('請輸入新名稱：', items[index].name);
            if (newName !== null && newName.trim() !== '') {
                items[index].name = newName.trim();
                saveCurrentList();
                updateUI();
            }
        }
        function clearAll() { items = []; saveCurrentList(); updateUI(); }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('hidden'); }
        function saveTarget() {
            const v = parseFloat(document.getElementById('target-input').value);
            if (v > 0) { 
                THRESHOLD = v; 
                updateTargetUI(); 
                toggleSettings(); 
                saveCurrentList();
                updateUI(); 
            }
        }

        function showToast(msg, icon, color) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = icon;
            t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-2xl shadow-tf-large z-50 font-bold flex items-center gap-2 pointer-events-none transition-all duration-500 ${color}`;
            t.style.opacity = '1'; t.style.transform = 'translateY(0) translateX(-50%)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(20px) translateX(-50%)'; }, 3000);
        }

        // Voice Support
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.onstart = () => document.getElementById('mic-btn').classList.add('text-red-400', 'pulse-mic');
            recognition.onend = () => document.getElementById('mic-btn').classList.remove('text-red-400', 'pulse-mic');
            recognition.onresult = (e) => {
                const t = e.results[0][0].transcript;
                const m = t.match(/(\d+(\.\d+)?)/);
                if(m) { 
                    document.getElementById('item-price').value = m[1]; 
                    document.getElementById('item-name').value = t.replace(m[0], '').trim(); 
                } else { 
                    document.getElementById('item-name').value = t; 
                }
            };
        }
        function toggleVoice() { if(recognition) recognition.start(); }
    </script>
</body>
</html>
